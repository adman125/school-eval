<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>内部客户评价系统</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');
:root{--p:#1a3a5c;--a:#c8963e;--l:#f5f0e8;--t:#2d2d2d;--m:#7a7a7a;--b:#d8cfc0;--g:#2e7d5e;--h:#faf6f0}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans SC','Microsoft YaHei',sans-serif;background:var(--l);color:var(--t);min-height:100vh}
.hd{background:var(--p);color:#fff;padding:14px 20px;display:flex;align-items:center;gap:12px;border-bottom:4px solid var(--a);position:sticky;top:0;z-index:50}
.hd-ic{width:38px;height:38px;background:var(--a);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.hd h1{font-size:16px;font-weight:700}.hd p{font-size:11px;opacity:.75;margin-top:1px}
.wrap{max-width:800px;margin:0 auto;padding:20px 14px 80px}
.card{background:#fff;border-radius:12px;padding:28px 24px;margin-top:20px;border:1px solid var(--b);box-shadow:0 3px 16px rgba(0,0,0,.06)}
.card h2{font-size:17px;color:var(--p);margin-bottom:5px;border-left:4px solid var(--a);padding-left:10px}
.sub{color:var(--m);font-size:13px;margin-bottom:18px;margin-top:4px}
.info{background:#e8f4fd;border:1px solid #b3d7f0;border-radius:8px;padding:11px 14px;font-size:13px;color:#1a4a6b;margin-bottom:16px;line-height:1.6}
.sw{position:relative}
.sw input{width:100%;padding:12px 14px;border:2px solid var(--b);border-radius:8px;font-size:16px;font-family:inherit;outline:none;transition:border-color .2s;background:var(--h)}
.sw input:focus{border-color:var(--p);background:#fff}
.dd{position:absolute;top:calc(100% + 3px);left:0;right:0;background:#fff;border:1px solid var(--b);border-radius:8px;box-shadow:0 6px 20px rgba(0,0,0,.12);max-height:210px;overflow-y:auto;z-index:100;display:none}
.dd.show{display:block}
.di{padding:10px 14px;cursor:pointer;font-size:14px;border-bottom:1px solid #f0f0f0}
.di:hover{background:var(--h)}.di:last-child{border-bottom:none}
.btn{display:inline-flex;align-items:center;gap:6px;padding:11px 22px;border-radius:8px;border:none;font-size:14px;font-family:inherit;cursor:pointer;font-weight:500;transition:all .2s;touch-action:manipulation}
.btn-a{background:var(--a);color:#fff;margin-top:14px;width:100%;justify-content:center;font-size:15px;padding:13px}
.btn-a:hover{background:#b07c2e}
.btn-g{background:var(--g);color:#fff}.btn-g:hover{background:#256650}
.btn-o{background:#fff;color:var(--p);border:2px solid var(--p)}.btn-o:hover{background:var(--h)}
.eh{background:#fff;border:1px solid var(--b);border-radius:12px;padding:16px 18px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 6px rgba(0,0,0,.04);gap:12px;position:sticky;top:66px;z-index:40}
.eh-l{flex:1}.eh-l h2{font-size:15px;color:var(--p)}.eh-l p{font-size:11px;color:var(--m);margin-top:2px}
.pw{display:flex;align-items:center;gap:8px;margin-top:8px}
.pb{flex:1;height:5px;background:#e8e0d4;border-radius:3px;overflow:hidden}
.pf{height:100%;background:var(--a);border-radius:3px;transition:width .3s}
.pt{font-size:11px;color:var(--m);white-space:nowrap}
.tc{background:#fff;border:1px solid var(--b);border-radius:10px;margin-bottom:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.tc.done{border-color:#a8d5c2}.tc.done .th{background:#f0faf5}
.th{padding:12px 16px;background:#fafafa;border-bottom:1px solid var(--b);display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.tm{display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap}
.tbg{padding:2px 8px;border-radius:16px;font-size:11px;font-weight:600;background:var(--p);color:#fff}
.trt{font-size:11px;color:var(--m);background:#f0ebe2;padding:2px 7px;border-radius:10px}
.tp{font-size:13px;font-weight:600;color:var(--p);line-height:1.4}
.tn{font-size:11px;color:var(--m);margin-top:2px}
.ci{font-size:18px;flex-shrink:0;margin-top:1px}
.tb{padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.qr{display:flex;gap:10px;align-items:flex-start;padding:11px 12px;background:var(--h);border:1px solid #ede6d8;border-radius:8px}
.qr.ans{background:#f4fbf7;border-color:#b8e0cc}
.qn{font-size:11px;font-weight:700;color:#fff;background:var(--p);border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.qri{flex:1;min-width:0}
.qt{font-size:13px;line-height:1.65;color:var(--t);margin-bottom:9px;word-break:break-all}
.sh{font-size:11px;color:var(--m);margin-bottom:6px}
.ss{display:flex;gap:5px;flex-wrap:wrap}
.st{width:40px;height:40px;border:2px solid var(--b);border-radius:7px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;font-weight:700;color:var(--m);background:#fff;transition:all .15s;user-select:none;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.st:active{transform:scale(.92)}
.st.sel{background:var(--a);border-color:var(--a);color:#fff}
.ci2{width:100%;padding:7px 10px;border:1px solid var(--b);border-radius:6px;font-size:12px;font-family:inherit;resize:vertical;min-height:44px;outline:none;background:#fff;margin-top:6px}
.ci2:focus{border-color:var(--p)}
.nb{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--b);padding:12px 20px;display:flex;gap:10px;align-items:center;box-shadow:0 -4px 12px rgba(0,0,0,.08);z-index:50}
.nb .btn-g{flex:1;justify-content:center;font-size:15px;padding:13px}
.done-wrap{text-align:center;padding:48px 24px}
.done-wrap .icon{font-size:64px;margin-bottom:16px}
.done-wrap h2{font-size:20px;color:var(--p);margin-bottom:10px}
.done-wrap p{color:var(--m);font-size:14px;margin-bottom:28px;line-height:1.6}
.hidden{display:none!important}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="hd">
  <div class="hd-ic">📋</div>
  <div><h1>内部客户评价系统</h1><p>四川天府新区华阳中学 / 香山中学</p></div>
</div>
<div id="toast" class="toast"></div>

<div id="loginScreen" class="wrap">
  <div class="card">
    <h2>开始评价</h2>
    <p class="sub">搜索您的姓名，系统自动加载您的评价任务</p>
    <div class="info">💡 填写完成后点「提交」，数据自动保存到服务器，管理员可实时查看汇总</div>
    <div class="sw">
      <input type="text" id="nameSearch" placeholder="输入姓名搜索…" autocomplete="off"/>
      <div class="dd" id="dd"></div>
    </div>
    <button class="btn btn-a" onclick="startEval()">开始填写 →</button>
  </div>
</div>

<div id="evalScreen" class="hidden">
  <div class="eh">
    <div class="eh-l">
      <h2 id="evalName"></h2>
      <p id="evalDesc"></p>
      <div class="pw"><div class="pb"><div class="pf" id="pf" style="width:0%"></div></div><span class="pt" id="pt"></span></div>
    </div>
    <button class="btn btn-o" style="font-size:12px;padding:7px 12px" onclick="backToLogin()">← 返回</button>
  </div>
  <div class="wrap" style="padding-top:0;padding-bottom:90px">
    <div id="taskList"></div>
  </div>
  <div class="nb">
    <button class="btn btn-g" onclick="submitAll()">✓ 提交评价结果</button>
    <span id="submitHint" style="font-size:12px;color:var(--m)"></span>
  </div>
</div>

<div id="doneScreen" class="wrap hidden">
  <div class="card done-wrap">
    <div class="icon">✅</div>
    <h2>评价已提交！</h2>
    <p id="doneMsg"></p>
    <button class="btn btn-o" onclick="backToLogin()">返回</button>
  </div>
</div>

<script>
let DB = null, currentUser = null, selectedName = null, ratings = {};

// 加载评价数据
fetch('/static/eval_data.json').then(r=>r.json()).then(d=>{
  DB = d;
  console.log('数据加载完成，评价人数:', d.all_evaluators.length);
}).catch(e=>console.error('数据加载失败',e));

document.getElementById('nameSearch').addEventListener('input', function(){
  if(!DB){return;}
  const q=this.value.trim(), dd=document.getElementById('dd');
  if(!q){dd.classList.remove('show');return;}
  const ms=DB.all_evaluators.filter(n=>n.includes(q)).slice(0,15);
  if(!ms.length){dd.classList.remove('show');return;}
  dd.innerHTML=ms.map(n=>'<div class="di" onclick="selName(\''+n+'\')">'+n+'</div>').join('');
  dd.classList.add('show');
});
document.addEventListener('click',e=>{if(!e.target.closest('.sw'))document.getElementById('dd').classList.remove('show');});

function selName(n){selectedName=n;document.getElementById('nameSearch').value=n;document.getElementById('dd').classList.remove('show');}

function startEval(){
  if(!DB){showToast('数据加载中，请稍候…');return;}
  const name=selectedName||document.getElementById('nameSearch').value.trim();
  if(!name){showToast('请先选择您的姓名');return;}
  if(!DB.evaluator_map[name]){showToast('未找到"'+name+'"的任务，请从列表选择');return;}
  currentUser=name; ratings={};
  renderEval();
}

function gk(ti,ii){return ti+'_'+ii;}

function renderEval(){
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('doneScreen').classList.add('hidden');
  document.getElementById('evalScreen').classList.remove('hidden');
  const tasks=DB.evaluator_map[currentUser];
  document.getElementById('evalName').textContent=currentUser+' 的评价任务';
  const total=tasks.reduce((s,t)=>s+t.indicators.length,0);
  document.getElementById('evalDesc').textContent='共 '+tasks.length+' 个岗位 · '+total+' 道题';
  updProg();
  const list=document.getElementById('taskList'); list.innerHTML='';
  tasks.forEach((task,ti)=>{
    const card=document.createElement('div'); card.className='tc'; card.id='tc'+ti;
    const qs=task.indicators.map((ind,ii)=>{
      const k=gk(ti,ii);
      return '<div class="qr" id="qr'+k+'"><div class="qn">'+(ii+1)+'</div><div class="qri">'+
        '<div class="qt">'+ind.replace(/\n/g,'<br>')+'</div>'+
        '<div class="sh">1=不满意 &nbsp;2=较不满意 &nbsp;3=一般 &nbsp;4=较满意 &nbsp;5=非常满意</div>'+
        '<div class="ss">'+[1,2,3,4,5].map(s=>'<div class="st" id="st_'+k+'_'+s+'" onclick="rate(\''+k+'\','+s+')">'+s+'</div>').join('')+'</div>'+
        '<textarea class="ci2" placeholder="评语（选填）" oninput="saveCmt(\''+k+'\',this.value)"></textarea>'+
      '</div></div>';
    }).join('');
    card.innerHTML='<div class="th"><div>'+
      '<div class="tm"><span class="tbg">'+task.dept+'</span><span class="trt">我作为：'+task.customer_role+'</span></div>'+
      '<div class="tp">'+task.position+'</div>'+
      '<div class="tn">共 '+task.indicators.length+' 题</div>'+
    '</div><span class="ci" id="ci'+ti+'">⬜</span></div>'+
    '<div class="tb">'+qs+'</div>';
    list.appendChild(card);
  });
  window.scrollTo(0,0);
}

function rate(k,s){
  if(!ratings[k])ratings[k]={score:0,comment:''};
  ratings[k].score=s;
  // update stars
  for(let i=1;i<=5;i++){
    const el=document.getElementById('st_'+k+'_'+i);
    if(el) el.classList.toggle('sel',i<=s);
  }
  const qr=document.getElementById('qr'+k); if(qr)qr.classList.add('ans');
  updStatus(); updProg();
}
function saveCmt(k,v){if(!ratings[k])ratings[k]={score:0,comment:''};ratings[k].comment=v;}

function updStatus(){
  DB.evaluator_map[currentUser].forEach((task,ti)=>{
    const done=task.indicators.every((_,ii)=>{const k=gk(ti,ii);return ratings[k]&&ratings[k].score>0;});
    document.getElementById('tc'+ti).classList.toggle('done',done);
    document.getElementById('ci'+ti).textContent=done?'✅':'⬜';
  });
}
function updProg(){
  let total=0,done=0;
  DB.evaluator_map[currentUser].forEach((task,ti)=>task.indicators.forEach((_,ii)=>{total++;const k=gk(ti,ii);if(ratings[k]&&ratings[k].score>0)done++;}));
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('pf').style.width=pct+'%';
  document.getElementById('pt').textContent=done+'/'+total+'（'+pct+'%）';
  document.getElementById('submitHint').textContent=done+'/'+total+' 项已评';
}

async function submitAll(){
  let unrated=0;
  DB.evaluator_map[currentUser].forEach((task,ti)=>task.indicators.forEach((_,ii)=>{const k=gk(ti,ii);if(!ratings[k]||!ratings[k].score)unrated++;}));
  if(unrated>0&&!confirm('还有 '+unrated+' 项未评分，确定提交吗？'))return;
  const tasks=DB.evaluator_map[currentUser];
  const rows=[];
  tasks.forEach((task,ti)=>task.indicators.forEach((ind,ii)=>{
    const k=gk(ti,ii),r=ratings[k]||{score:null,comment:''};
    rows.push({dept:task.dept,position:task.position,role:task.customer_role,indicator:ind,score:r.score||null,comment:r.comment||''});
  }));
  try{
    const res=await fetch('/api/submit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({evaluator:currentUser,rows})});
    const data=await res.json();
    if(data.ok){showDone(rows.length);}
    else{showToast('提交失败：'+data.msg);}
  }catch(e){showToast('网络错误，请重试');}
}

function showDone(count){
  document.getElementById('evalScreen').classList.add('hidden');
  document.getElementById('doneScreen').classList.remove('hidden');
  document.getElementById('doneMsg').textContent='共提交 '+count+' 项评分，数据已保存到服务器。感谢您的参与！';
  window.scrollTo(0,0);
}
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}
function backToLogin(){
  ['evalScreen','doneScreen'].forEach(id=>document.getElementById(id).classList.add('hidden'));
  document.getElementById('loginScreen').classList.remove('hidden');
  currentUser=null;selectedName=null;ratings={};
  document.getElementById('nameSearch').value='';
  window.scrollTo(0,0);
}
</script>
</body>
</html>
