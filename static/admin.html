<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理员汇总 · 内部客户评价</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');
:root{--p:#1a3a5c;--a:#c8963e;--l:#f5f0e8;--t:#2d2d2d;--m:#7a7a7a;--b:#d8cfc0;--g:#2e7d5e;--h:#faf6f0}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans SC','Microsoft YaHei',sans-serif;background:var(--l);color:var(--t)}
.hd{background:var(--p);color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:4px solid var(--a);flex-wrap:wrap;gap:10px}
.hd-l{display:flex;align-items:center;gap:12px}
.hd-ic{width:38px;height:38px;background:var(--a);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px}
.hd h1{font-size:16px;font-weight:700}.hd p{font-size:11px;opacity:.75;margin-top:1px}
.hd-r{display:flex;gap:8px;flex-wrap:wrap}
.wrap{max-width:1100px;margin:0 auto;padding:20px 16px 60px}
.sr{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px}
.sc{background:#fff;border-radius:10px;padding:16px 20px;flex:1;min-width:130px;border:1px solid var(--b);box-shadow:0 2px 6px rgba(0,0,0,.05)}
.sc .num{font-size:28px;font-weight:700;color:var(--p)}.sc .lbl{font-size:12px;color:var(--m);margin-top:3px}
.po{background:#e8e0d4;border-radius:4px;height:6px;margin-top:8px}
.pi{height:100%;border-radius:4px;background:var(--a);transition:width .4s}
.card{background:#fff;border-radius:12px;padding:20px;border:1px solid var(--b);box-shadow:0 3px 14px rgba(0,0,0,.06);margin-bottom:16px}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.ch h2{font-size:15px;color:var(--p);border-left:4px solid var(--a);padding-left:9px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:7px;border:none;font-size:13px;font-family:inherit;cursor:pointer;font-weight:500;transition:all .2s}
.btn-p{background:var(--p);color:#fff}.btn-p:hover{background:#254d7a}
.btn-g{background:var(--g);color:#fff}.btn-g:hover{background:#256650}
.btn-a{background:var(--a);color:#fff}.btn-a:hover{background:#b07c2e}
.btn-o{background:#fff;color:var(--p);border:2px solid var(--p)}.btn-o:hover{background:var(--h)}
.fr{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.fr input,.fr select{padding:7px 11px;border:1px solid var(--b);border-radius:7px;font-family:inherit;font-size:13px;outline:none;background:#fff}
.fr input:focus,.fr select:focus{border-color:var(--p)}
.tw{overflow:auto;max-height:480px;border-radius:8px;border:1px solid var(--b)}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--p);color:#fff;padding:8px 10px;text-align:left;font-weight:500;white-space:nowrap;position:sticky;top:0;z-index:2}
td{padding:7px 10px;border-bottom:1px solid #f0e8d8;vertical-align:top}
tr:hover td{background:var(--h)}
.sb{display:inline-block;padding:1px 7px;border-radius:10px;font-weight:700;font-size:12px;white-space:nowrap}
.s5{background:#d4edda;color:#155724}.s4{background:#cce5ff;color:#004085}
.s3{background:#fff3cd;color:#856404}.s2{background:#ffe5b4;color:#7d4e00}.s1{background:#f8d7da;color:#721c24}
.tab-r{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.tab{padding:7px 16px;border-radius:7px;border:2px solid var(--b);background:#fff;cursor:pointer;font-size:13px;font-family:inherit;transition:all .2s;font-weight:500}
.tab.on{background:var(--p);color:#fff;border-color:var(--p)}
.empty{text-align:center;padding:40px;color:var(--m);font-size:13px}
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;background:#e8f4fd;color:#1a4a6b;margin:2px}
.hidden{display:none!important}
</style>
</head>
<body>
<div class="hd">
  <div class="hd-l">
    <div class="hd-ic">📊</div>
    <div><h1>管理员汇总</h1><p>内部客户评价系统 · 实时数据</p></div>
  </div>
  <div class="hd-r">
    <button class="btn btn-o" onclick="loadAll()" id="refreshBtn">🔄 刷新</button>
    <button class="btn btn-g" onclick="exportData()">⬇ 导出Excel</button>
  </div>
</div>

<div class="wrap">
  <!-- 统计卡片 -->
  <div class="sr">
    <div class="sc"><div class="num" id="s1">-</div><div class="lbl">已提交人数</div></div>
    <div class="sc"><div class="num">469</div><div class="lbl">总评价人数</div></div>
    <div class="sc"><div class="num" id="s2">-</div><div class="lbl">总评分条目</div></div>
    <div class="sc"><div class="num" id="s3">-</div><div class="lbl">整体平均分</div></div>
    <div class="sc">
      <div class="num" id="s4">0%</div>
      <div class="lbl">完成率</div>
      <div class="po"><div class="pi" id="s4bar" style="width:0%"></div></div>
    </div>
  </div>

  <!-- 标签页 -->
  <div class="tab-r">
    <button class="tab on" onclick="switchTab('detail')">📋 明细数据</button>
    <button class="tab" onclick="switchTab('pos')">🏢 按岗位汇总</button>
    <button class="tab" onclick="switchTab('submitted')">✅ 已提交名单</button>
  </div>

  <!-- 明细 -->
  <div id="t-detail" class="card">
    <div class="ch"><h2>评价明细</h2><span id="detailCnt" style="font-size:12px;color:var(--m)"></span></div>
    <div class="fr">
      <input id="f1" placeholder="搜索评价人…" oninput="loadDetail()">
      <input id="f2" placeholder="搜索被评岗位…" oninput="loadDetail()">
      <select id="f3" onchange="loadDetail()">
        <option value="">全部分数</option>
        <option>5</option><option>4</option><option>3</option><option>2</option><option>1</option>
      </select>
    </div>
    <div class="tw">
      <table><thead><tr>
        <th>评价人</th><th>部门</th><th>被评岗位</th><th>评价者角色</th><th>指标</th><th>评分</th><th>评语</th><th>时间</th>
      </tr></thead>
      <tbody id="detailBody"></tbody></table>
    </div>
    <div id="detailMore" style="text-align:center;padding:10px;display:none">
      <button class="btn btn-o" onclick="loadMoreDetail()">加载更多</button>
    </div>
  </div>

  <!-- 按岗位 -->
  <div id="t-pos" class="card hidden">
    <div class="ch"><h2>按被评岗位汇总（平均分）</h2></div>
    <div class="fr">
      <input id="f4" placeholder="搜索岗位…" oninput="loadPos()">
      <select id="f5" onchange="loadPos()"><option value="">全部部门</option></select>
    </div>
    <div class="tw">
      <table><thead><tr>
        <th>部门</th><th>被评岗位</th><th>评价者角色</th><th>指标</th><th>评分人数</th><th>平均分</th>
      </tr></thead>
      <tbody id="posBody"></tbody></table>
    </div>
  </div>

  <!-- 已提交 -->
  <div id="t-submitted" class="card hidden">
    <div class="ch"><h2>已提交名单</h2><span id="subCnt" style="font-size:12px;color:var(--m)"></span></div>
    <div id="subList"></div>
  </div>
</div>

<script>
const SL = {1:'不满意',2:'较不满意',3:'一般',4:'较满意',5:'非常满意'};
let detailOffset=0, detailTotal=0;

async function loadAll(){
  document.getElementById('refreshBtn').textContent='⏳';
  await Promise.all([loadStats(), loadDetail(), loadPos(), loadSubmitted()]);
  document.getElementById('refreshBtn').textContent='🔄 刷新';
}

async function loadStats(){
  const d=await fetch('/api/stats').then(r=>r.json());
  document.getElementById('s1').textContent=d.submitted;
  document.getElementById('s2').textContent=d.total_rows;
  document.getElementById('s3').textContent=d.avg??'-';
  const pct=Math.round(d.submitted/d.total_evaluators*100);
  document.getElementById('s4').textContent=pct+'%';
  document.getElementById('s4bar').style.width=pct+'%';
}

async function loadDetail(reset=true){
  if(reset){detailOffset=0;}
  const ev=document.getElementById('f1').value.trim();
  const pos=document.getElementById('f2').value.trim();
  const sc=document.getElementById('f3').value;
  const url='/api/detail?limit=100&offset='+detailOffset+(ev?'&evaluator='+encodeURIComponent(ev):'')+(pos?'&position='+encodeURIComponent(pos):'')+(sc?'&score='+sc:'');
  const d=await fetch(url).then(r=>r.json());
  detailTotal=d.total;
  document.getElementById('detailCnt').textContent='共 '+d.total+' 条'+(d.total>100?' （显示前100条）':'');
  const tbody=document.getElementById('detailBody');
  if(reset) tbody.innerHTML='';
  if(!d.rows.length&&reset){tbody.innerHTML='<tr><td colspan="8" class="empty">暂无数据</td></tr>';return;}
  d.rows.forEach(r=>{
    const sc=r.score;
    const badge=sc?'<span class="sb s'+sc+'">'+sc+' '+(SL[sc]||'')+'</span>':'-';
    const dt=r.submitted_at?r.submitted_at.substring(0,16).replace('T',' '):'';
    const tr=document.createElement('tr');
    tr.innerHTML='<td><b>'+r.evaluator+'</b></td><td>'+( r.dept||'')+'</td>'+
      '<td style="font-size:11px;max-width:160px">'+( r.position||'')+'</td>'+
      '<td style="font-size:11px">'+( r.customer_role||'')+'</td>'+
      '<td style="font-size:11px;max-width:200px">'+( r.indicator||'').substring(0,55)+'…</td>'+
      '<td>'+badge+'</td><td style="font-size:11px">'+( r.comment||'')+'</td>'+
      '<td style="font-size:11px;color:#888">'+dt+'</td>';
    tbody.appendChild(tr);
  });
  document.getElementById('detailMore').style.display=(detailOffset+100<detailTotal)?'block':'none';
}
function loadMoreDetail(){detailOffset+=100;loadDetail(false);}

let deptsFilled=false;
async function loadPos(){
  const pos=document.getElementById('f4').value.trim();
  const dept=document.getElementById('f5').value;
  const d=await fetch('/api/by_position'+(dept?'?dept='+encodeURIComponent(dept):'')+(pos?( dept?'&':'?')+'position='+encodeURIComponent(pos):'')).then(r=>r.json());
  if(!deptsFilled&&d.length){
    const depts=[...new Set(d.map(r=>r.dept))].filter(Boolean).sort();
    const sel=document.getElementById('f5');
    depts.forEach(dp=>{const o=document.createElement('option');o.value=dp;o.textContent=dp;sel.appendChild(o);});
    deptsFilled=true;
  }
  const tbody=document.getElementById('posBody');tbody.innerHTML='';
  if(!d.length){tbody.innerHTML='<tr><td colspan="6" class="empty">暂无数据</td></tr>';return;}
  d.forEach(r=>{
    const avg=r.avg_score?r.avg_score.toFixed(2):'-';
    const cls=r.avg_score>=4.5?'s5':r.avg_score>=3.5?'s4':r.avg_score>=2.5?'s3':r.avg_score>=1.5?'s2':'s1';
    const tr=document.createElement('tr');
    tr.innerHTML='<td>'+( r.dept||'')+'</td><td style="font-size:11px">'+( r.position||'')+'</td>'+
      '<td style="font-size:11px">'+( r.customer_role||'')+'</td>'+
      '<td style="font-size:11px;max-width:200px">'+( r.indicator||'').substring(0,55)+'…</td>'+
      '<td style="text-align:center">'+r.cnt+'</td><td><span class="sb '+cls+'">'+avg+'</span></td>';
    tbody.appendChild(tr);
  });
}

async function loadSubmitted(){
  const d=await fetch('/api/who_submitted').then(r=>r.json());
  document.getElementById('subCnt').textContent='共 '+d.length+' 人已提交';
  document.getElementById('subList').innerHTML=d.map(r=>'<span class="tag" title="'+r.at+'">'+r.name+'</span>').join('');
}

function switchTab(t){
  ['detail','pos','submitted'].forEach(id=>{
    document.getElementById('t-'+id).classList.toggle('hidden',id!==t);
  });
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('on',['detail','pos','submitted'][i]===t));
}

function exportData(){window.open('/api/export_csv','_blank');}

loadAll();
setInterval(loadStats, 30000); // 每30秒自动刷新统计
</script>
</body>
</html>
